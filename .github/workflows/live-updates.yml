name: Marcador en vivo (cada 5 minutos)

# El plan gratis de Vercel (Hobby) solo dispara los Cron Jobs una vez al día,
# sin importar la expresión cron que se use — no sirve para "cada 5
# minutos". Por eso el disparador real de /api/live-updates es este workflow
# de GitHub Actions (gratis, sin depender del plan de Vercel), no la entrada
# de vercel.json. GitHub no garantiza el minuto exacto (puede atrasarse
# algunos minutos en horas de mucha carga), pero es suficiente para un
# marcador que se refresca cada 5 minutos.
#
# Requiere un secreto de repositorio llamado CRON_SECRET con el mismo valor
# que la variable de entorno CRON_SECRET configurada en Vercel (Settings ->
# Secrets and variables -> Actions -> New repository secret).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping-live-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar a /api/live-updates
        run: |
          curl -sf "https://profetas-fpc.vercel.app/api/live-updates" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "live-updates devolvió un error o no había nada que actualizar"
